<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #ticker-results { display: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-8">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
            <h1 class="text-3xl font-bold mb-6">Edit Transaction</h1>
            <form method="POST" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-semibold mb-1">Transaction Date</label>
                        <input type="date" name="date" value="{{ trans.transaction_date }}" class="w-full p-3 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block font-semibold mb-1">Transaction Type</label>
                        <select name="trans_type" class="w-full p-3 border rounded-lg bg-white" required>
                            <option {% if trans.transaction_type == 'BUY' %}selected{% endif %}>BUY</option>
                            <option {% if trans.transaction_type == 'SELL' %}selected{% endif %}>SELL</option>
                            <option {% if trans.transaction_type == 'DIVIDEND' %}selected{% endif %}>DIVIDEND</option>
                            <option {% if trans.transaction_type == 'REWARD' %}selected{% endif %}>REWARD</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative">
                        <label class="block font-semibold mb-1">Ticker Symbol</label>
                        <input type="text" name="symbol" value="{{ trans.symbol }}" class="w-full p-3 border rounded-lg" required autocomplete="off">
                        <div id="ticker-results" class="absolute z-10 w-full bg-white border rounded-lg mt-1 max-h-60 overflow-y-auto shadow-lg"></div>
                    </div>
                    <div>
                        <label class="block font-semibold mb-1">Group (Optional)</label>
                        <input type="text" name="group" value="{{ trans.group_name or '' }}" class="w-full p-3 border rounded-lg bg-gray-50">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-semibold mb-1">Shares</label>
                        <input type="number" step="any" name="shares" value="{{ trans.shares }}" class="w-full p-3 border rounded-lg">
                    </div>
                    <div>
                        <label class="block font-semibold mb-1">Price per Share</label>
                        <input type="number" step="any" name="price" value="{{ trans.price_per_share }}" class="w-full p-3 border rounded-lg bg-gray-50">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-semibold mb-1">Transaction Cost</label>
                        <input type="number" step="any" name="cost" value="{{ trans.transaction_cost }}" class="w-full p-3 border rounded-lg">
                    </div>
                    <div>
                        <label class="block font-semibold mb-1">Tax Cost</label>
                        <input type="number" step="any" name="tax" value="{{ trans.tax_cost }}" class="w-full p-3 border rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="block font-semibold mb-1">Notes (Optional)</label>
                    <textarea name="notes" rows="3" class="w-full p-3 border rounded-lg">{{ trans.notes or '' }}</textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition">Save Changes</button>
                    <a href="{{ url_for('transaction_list') }}" class="w-full text-center bg-gray-200 text-gray-800 font-bold py-3 px-4 rounded-lg hover:bg-gray-300 transition">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        const tickerInput = document.querySelector('input[name="symbol"]');
        const groupInput = document.querySelector('input[name="group"]');
        const priceInput = document.querySelector('input[name="price"]');
        const dateInput = document.querySelector('input[name="date"]');
        const typeSelect = document.querySelector('select[name="trans_type"]');
        const resultsDiv = document.getElementById('ticker-results');
        let debounceTimer;

        const getApiData = async () => {
            const ticker = tickerInput.value.trim();
            const date = dateInput.value;
            const type = typeSelect.value;
            if (!ticker || !date) return;
            
            let url;
            if (type === 'DIVIDEND') {
                url = `/api/get-dividend-info?ticker=${ticker}&date=${date}`;
            } else if (type === 'BUY' || type === 'SELL') {
                url = `/api/get-historical-price?ticker=${ticker}&date=${date}`;
            } else { return; }

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API fetch failed');
                const data = await response.json();
                if (data.price) {
                    priceInput.value = data.price.toFixed(2);
                } else if (data.dividend_per_share) {
                    priceInput.value = data.dividend_per_share.toFixed(4);
                }
            } catch (error) { console.error('Error fetching data:', error); }
        };

        tickerInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const query = tickerInput.value.trim();
            if (query.length < 1) { resultsDiv.style.display = 'none'; return; }
            debounceTimer = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/search-tickers?q=${query}`);
                    const data = await response.json();
                    resultsDiv.innerHTML = '';
                    if (data.length > 0) {
                        resultsDiv.style.display = 'block';
                        data.slice(0, 7).forEach(stock => {
                            const item = document.createElement('div');
                            item.className = 'p-3 hover:bg-gray-100 cursor-pointer border-b';
                            item.innerHTML = `<div class="font-bold">${stock.symbol}</div><div class="text-sm text-gray-600">${stock.name}</div>`;
                            item.addEventListener('click', () => {
                                tickerInput.value = stock.symbol;
                                groupInput.value = stock.group || '';
                                resultsDiv.style.display = 'none';
                                getApiData();
                            });
                            resultsDiv.appendChild(item);
                        });
                    } else { resultsDiv.style.display = 'none'; }
                } catch (error) { console.error('Ticker search failed:', error); }
            }, 300);
        });

        dateInput.addEventListener('change', getApiData);
        typeSelect.addEventListener('change', getApiData);

        document.addEventListener('click', (e) => {
            if (!tickerInput.contains(e.target) && !resultsDiv.contains(e.target)) {
                resultsDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
